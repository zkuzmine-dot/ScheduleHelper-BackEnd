events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name shedulehelper.ib22.ru;  # Замените на ваш домен (например, example.com)

        # Перенаправляем HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 4443 ssl;
        server_name shedulehelper.ib22.ru;  # Замените на ваш домен

        # Путь к SSL-сертификатам
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Настройки безопасности
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://fastapi:8000;  # Перенаправляем запросы на FastAPI
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
	location /docs {
            proxy_pass http://fastapi:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
